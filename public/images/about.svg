<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#f5f3ff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#card-bg)" rx="16"/>
  <!-- Person (teacher) -->
  <circle cx="200" cy="140" r="40" fill="#bfdbfe"/>
  <circle cx="200" cy="130" r="25" fill="#fde68a"/>
  <!-- Hair -->
  <path d="M175 120 Q200 95 225 120" fill="#92400e"/>
  <!-- Face -->
  <circle cx="192" cy="128" r="3" fill="#1e293b"/>
  <circle cx="208" cy="128" r="3" fill="#1e293b"/>
  <path d="M193 138 Q200 144 207 138" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="175" y="165" width="50" height="80" rx="10" fill="#3b82f6"/>
  <!-- Arms pointing to board -->
  <line x1="225" y1="190" x2="280" y2="170" stroke="#3b82f6" stroke-width="12" stroke-linecap="round"/>
  <!-- Whiteboard -->
  <rect x="300" y="100" width="220" height="160" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
  <rect x="390" y="90" width="40" height="10" rx="4" fill="#94a3b8"/>
  <!-- Content on board -->
  <text x="330" y="140" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">English</text>
  <rect x="330" y="155" width="80" height="4" rx="2" fill="#93c5fd"/>
  <rect x="330" y="167" width="60" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="330" y="179" width="70" height="4" rx="2" fill="#cbd5e1"/>
  <text x="330" y="210" font-family="sans-serif" font-size="14" fill="#7c3aed">A → B → C</text>
  <rect x="330" y="225" width="50" height="4" rx="2" fill="#c4b5fd"/>
  <!-- Student desk -->
  <rect x="150" y="300" width="300" height="12" rx="4" fill="#64748b"/>
  <!-- Notebook on desk -->
  <rect x="260" y="270" width="60" height="40" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="270" y="280" width="30" height="3" rx="1" fill="#93c5fd"/>
  <rect x="270" y="288" width="25" height="3" rx="1" fill="#cbd5e1"/>
  <rect x="270" y="296" width="28" height="3" rx="1" fill="#cbd5e1"/>
  <!-- Coffee cup -->
  <rect x="180" y="275" width="25" height="30" rx="4" fill="#fff" stroke="#d97706" stroke-width="2"/>
  <path d="M205 285 Q215 290 205 300" stroke="#d97706" stroke-width="2" fill="none"/>
  <!-- Steam -->
  <path d="M188 270 Q190 262 192 270" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M195 268 Q197 260 199 268" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Decorative elements -->
  <circle cx="530" cy="80" r="20" fill="#bfdbfe" opacity="0.5"/>
  <circle cx="80" cy="350" r="30" fill="#c4b5fd" opacity="0.4"/>
  <text x="500" y="350" font-size="28">📚</text>
  <text x="70" y="100" font-size="24">🌟</text>
</svg>
