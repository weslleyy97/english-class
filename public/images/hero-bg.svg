<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="80" fill="#3b82f6" opacity="0.3"/>
  <circle cx="150" cy="500" r="120" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="700" cy="450" r="60" fill="#60a5fa" opacity="0.2"/>
  <!-- Book -->
  <rect x="280" y="200" width="240" height="300" rx="8" fill="#fff" opacity="0.95"/>
  <rect x="280" y="200" width="120" height="300" rx="8" fill="#f8fafc"/>
  <line x1="400" y1="200" x2="400" y2="500" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Book spine shadow -->
  <rect x="395" y="200" width="10" height="300" fill="#e2e8f0" opacity="0.5"/>
  <!-- Text lines on book -->
  <rect x="310" y="250" width="60" height="6" rx="3" fill="#93c5fd"/>
  <rect x="310" y="270" width="50" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="310" y="282" width="55" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="310" y="294" width="45" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="310" y="320" width="60" height="6" rx="3" fill="#93c5fd"/>
  <rect x="310" y="340" width="50" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="310" y="352" width="55" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="430" y="250" width="60" height="6" rx="3" fill="#c4b5fd"/>
  <rect x="430" y="270" width="50" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="430" y="282" width="55" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="430" y="294" width="45" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="430" y="320" width="60" height="6" rx="3" fill="#c4b5fd"/>
  <rect x="430" y="340" width="50" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="430" y="352" width="55" height="4" rx="2" fill="#cbd5e1"/>
  <!-- Pen -->
  <rect x="540" y="180" width="8" height="200" rx="4" fill="#fbbf24" transform="rotate(15 544 280)"/>
  <polygon points="540,380 544,400 548,380" fill="#1e293b" transform="rotate(15 544 390)"/>
  <!-- Speech bubbles -->
  <rect x="150" y="150" width="120" height="60" rx="16" fill="#fff" opacity="0.9"/>
  <text x="175" y="187" font-family="sans-serif" font-size="18" font-weight="bold" fill="#3b82f6">Hello!</text>
  <polygon points="200,210 210,230 220,210" fill="#fff" opacity="0.9"/>
  <rect x="530" y="100" width="140" height="60" rx="16" fill="#fff" opacity="0.9"/>
  <text x="548" y="137" font-family="sans-serif" font-size="18" font-weight="bold" fill="#7c3aed">Welcome!</text>
  <polygon points="590,160 600,180 610,160" fill="#fff" opacity="0.9"/>
  <!-- Graduation cap -->
  <polygon points="400,120 350,145 400,170 450,145" fill="url(#accent)"/>
  <rect x="396" y="100" width="8" height="30" fill="#60a5fa"/>
  <circle cx="400" cy="98" r="6" fill="#fbbf24"/>
  <!-- Stars -->
  <text x="100" y="300" font-size="24" opacity="0.6">✨</text>
  <text x="680" y="280" font-size="20" opacity="0.6">⭐</text>
  <text x="600" y="520" font-size="22" opacity="0.5">💡</text>
</svg>
